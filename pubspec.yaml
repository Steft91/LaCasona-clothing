name: la_casona
description: "La Casona — Fashion e-commerce app with colonial Quito aesthetic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # Authentication
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # ML & AI
  google_mlkit_image_labeling: ^0.14.0
  google_generative_ai: ^0.4.6

  # Navigation
  go_router: ^14.8.1

  # Environment
  flutter_dotenv: ^5.2.1

  # Formatting
  intl: ^0.20.2
  http: ^1.5.0

  # Typography
  google_fonts: ^6.2.1
  flutter_stripe: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/brand/la_casona_logo.png
